global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'dotnet-services'
    static_configs:
      - targets: ['abs-integration-service:8084', 'web-invoice-service:8085']
    metrics_path: '/metrics'

  - job_name: 'cadvisor'
    static_configs: [{ targets: ['cadvisor:8080'] }]